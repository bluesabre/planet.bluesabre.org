<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex">
<title>{{ page.title | default: "Redirecting" }} - Planet Bluesabre</title>
{% assign target = "/" | relative_url | append: "?from=" | append: page.bucket %}
<meta http-equiv="refresh" content="0; url={{ target }}">
<link rel="canonical" href="{{ site.url }}/">
<script>window.location.replace({{ target | jsonify }});</script>
</head>
<body>
<p>Planet Bluesabre has been discontinued. Redirecting you to the <a href="{{ target }}">home page</a>&hellip;</p>
</body>
</html>
