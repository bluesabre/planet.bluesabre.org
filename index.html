---
layout: default
title: Home
cover: false
post_class: home-template
---

<header class="main-header no-cover">
    <nav class="main-nav overlay clearfix"></nav>
    <div class="vertical">
        <div class="main-header-content inner">
            <h1 class="page-title">{{ site.name }}</h1>
            <h2 class="page-description">Planet Bluesabre has been discontinued.</h2>
        </div>
    </div>
</header>

<main id="content" class="content" role="main">
    <div class="inner landing">
        {% include landing-links.html %}

        <section id="redirect-banner" class="redirect-banner" hidden>
            <p id="redirect-banner-text"></p>
        </section>
    </div>
</main>

<script>
(function () {
    var banners = {
        xfce:    { url: "https://xfce.org",     label: "Xfce" },
        xubuntu: { url: "https://xubuntu.org",  label: "Xubuntu" },
        sean:    { url: "https://seand.xyz", label: "Sean's site (seand.xyz)" }
    };
    var params = new URLSearchParams(window.location.search);
    var bucket = banners[params.get("from")];
    if (bucket) {
        document.getElementById("redirect-banner-text").innerHTML =
            "You may be looking for this: <a href=\"" + bucket.url + "\">" + bucket.label + "</a>.";
        document.getElementById("redirect-banner").hidden = false;
    }
})();
</script>
